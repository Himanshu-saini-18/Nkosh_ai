<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nkosh Kisaan Ai | Kisano Ka Digital Saarthi</title>

    <link rel="icon" type="image/png" href="/assets/logo.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="login.css" />
  </head>

  <body class="nk-dark">
    <nav class="navbar nk-navbar sticky-top">
      <div class="container py-3 d-flex align-items-center justify-content-between">
        <div style="width: 44px"></div>
      </div>
    </nav>

    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
      <div class="col-12 col-md-7 col-lg-5">
        <div class="nk-login-premium p-4 p-md-5">
          <div class="text-center mb-4 nk-logo-hero">
            <div class="nk-logo-ring-lg mx-auto mb-3">
              <img src="assets/logo.png" class="nk-logo-lg" alt="Nkosh" />
            </div>
            <h3 class="fw-bold mb-1">Welcome Back</h3>
            <div class="nk-muted">Login To Continue</div>
          </div>

         
          <div id="alertBox" class="alert d-none" role="alert"></div>

          <form id="requestOtpForm">
            <div class="mb-3">
              <label class="nk-label">Full Name</label>
              <input
                id="name"
                type="text"
                class="form-control nk-input"
                placeholder="Enter Full Name"
                required
              />
            </div>

            <div class="mb-3">
              <label class="nk-label">Phone Number</label>
              <input
                id="phoneNumber"
                type="tel"
                class="form-control nk-input"
                placeholder="Enter Phone Number"
                maxlength="10"
                required
              />
              <div class="nk-muted small mt-1">OTP Will Be Sent On This Number</div>
            </div>

            <button id="sendOtpBtn" class="nk-btn-primary w-100 mb-3" type="submit">
              Send OTP <i class="bi bi-arrow-right ms-2"></i>
            </button>

            <div class="text-center">
              <a href="index.html" class="nk-link small">Back To Home</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
