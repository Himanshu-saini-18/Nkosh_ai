<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nkosh Kisaan Ai | Kisano Ka Digital Saarthi</title>
    <link rel="icon" type="image/png" href="/assets/logo.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="talk-ui.css" />
  </head>

  <body>
    <nav class="navbar navbar-blur sticky-top">
      <div
        class="container py-3 d-flex align-items-center justify-content-between"
      >
        <a href="kisaan.ai.html" class="icon-btn">
          <i class="bi bi-arrow-left"></i>
        </a>

        <div class="brand-wrap text-center">
          <div class="logo-ring">
            <img src="assets/logo.png" class="header-logo" alt="Nkosh" />
          </div>
          <div class="brand-title">Nkosh Kisaan Ai</div>
          <div class="brand-sub">Kisano Ka Digital Saarthi</div>
        </div>

        <a href="#" id="authBtn" class="icon-btn" aria-label="auth">
          <i id="authIcon" class="bi bi-person"></i>
        </a>
      </div>
    </nav>

    <main class="container talk-shell pb-5">
      <div class="hot-card">
        <div class="card-topline"></div>

        <div class="p-4 p-md-5">
          <div
            class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4"
          >
            <div class="d-flex align-items-center gap-3">
              <div class="hot-icon"><i class="bi bi-mic-fill"></i></div>
              <div>
                <div class="fw-bold fs-4">Voice Assistant</div>
                <div
                  class="text-secondary-emphasis"
                  style="color: var(--muted) !important"
                >
                  Hold The Button To Speak (Supports 10 Indian Languages + English)
                </div>
              </div>
            </div>
          </div>

          <div class="d-flex flex-wrap gap-2 mb-4">
            <span
              id="statusBadge"
              class="badge text-bg-secondary px-3 py-2 rounded-pill"
            >
              Idle
            </span>

            <span class="badge pill-dark px-3 py-2 rounded-pill">
              Locale: <span id="localeText">hi-IN</span>
            </span>

            <button id="toggleLocale" class="btn btn-pill-outline px-3 py-2">
              Switch To English
            </button>

            <button id="toggleAutoSpeak" class="btn btn-pill-outline px-3 py-2">
              Auto Speak: Off
            </button>

            <span class="chip-green ms-auto d-none d-md-inline-flex">
              ✨ AI Powered
            </span>
          </div>

          <div class="glass-box mb-3" style="min-height: 120px">
            <div class="label-muted">Your Speech (Transcript)</div>
            <div id="transcriptText" class="mono-strong">—</div>
          </div>

          <div class="glass-box mb-4" style="min-height: 140px">
            <div class="label-muted">Nkosh A.I Reply</div>
            <div id="aiReplyText" class="mono-strong">—</div>
          </div>

          <div class="d-flex flex-wrap gap-2">
            <button id="holdToTalkBtn" class="btn btn-dark-soft">
              <i class="bi bi-mic-fill me-1"></i> Hold To Talk
            </button>

            <button id="speakBtn" class="btn btn-success-soft" disabled>
              <i class="bi bi-volume-up-fill me-1"></i>
            </button>

            <button id="clearBtn" class="btn btn-light-soft">
              <i class="bi bi-trash3 me-1"></i> Clear
            </button>
          </div>
        </div>
      </div>
    </main>

    <div
      class="modal fade"
      id="trialOverModal"
      tabindex="-1"
      aria-labelledby="trialOverModalLabel"
      aria-hidden="true"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="trialOverModalLabel">
              Free Trial Over
            </h5>
          </div>

          <div class="modal-body">
            Your Free Trial Is Over. Please Login To Continue Using Nkosh
            Saarthi.
          </div>

          <div class="modal-footer">
            <button id="goLoginBtn" type="button" class="btn btn-primary">
              Go To Login
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="trial.js"></script>
<script src="talk.js"></script>

    <script>
      (function () {
  const authBtn = document.getElementById("authBtn");
  const authIcon = document.getElementById("authIcon");

  const token = localStorage.getItem("nk_token");

  if (token) {
  
    authIcon.className = "bi bi-box-arrow-right";

    authBtn.addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.removeItem("nk_token");
      localStorage.removeItem("nk_farmerId");
      localStorage.removeItem("nk_name");
      localStorage.removeItem("nk_phone");
      window.location.href = "login.html";
    });
  } else {
    
    authIcon.className = "bi bi-person";
    authBtn.addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.setItem("nk_redirect_after_login", "talk.html");
      window.location.href = "login.html";
    });
  }
})();

    </script>
  </body>
</html>
